[package]
name = "Warehouse"
version = "0.1.0"
edition = "2021"


[dependencies]
slint = "1.14.1"
reqwest = { version = "0.12", features = ["cookies", "json", "blocking", "multipart"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
image = { version = "0.25", features = ["webp"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "macros"] }
rfd = "0.15"

[build-dependencies]
slint-build = "1.14.1"
